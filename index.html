<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La mejor novia</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Homepage -->
    <div id="home-page" class="page active">
        <div class="glass-card">
            <img src="assets/image.jpg" alt="Romantic couple" class="image1">
            <h1 class="main-heading">Te amo demasiado</h1>
            
            <div class="button-container">
                <button id="things-btn" class="primary-btn">Canzoni che mi ricordano te</button>
                <button id="situation-btn" class="primary-btn">Le foto più belle</button>
            </div>
        </div>
    </div>
    <!-- Things I Wanted To Say Page -->
    <div id="things-page" class="page">
        <div class="glass-card">
            <button id="back-things" class="back-btn">← Back</button>
            <div class="content-container">
                <h2 class="page-title">Sessantadue canzoni per sessantadue settimane</h2>
                <p class="content-text">
                    <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/030LAnGNUEoMVHKpBERwFU?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </p>
            </div>
        </div>
    </div>
    
    <!-- Our Situation Page -->
    <div id="situation-page" class="page">
        <div class="glass-card">
            <button id="back-situation" class="back-btn">← Back</button>
            <div class="content-container">
                <h2 class="page-title">Bellissime foto di una bellissima ragazza</h2>
                <p class="content-text">
                    <img src="assets/image2.jpg" alt="foto1" class="image2">
                    <img src="assets/image3.jpg" alt="foto1" class="image3">
                    <img src="assets/image4.jpg" alt="foto1" class="image4">
                    <img src="assets/image5.jpg" alt="foto1" class="image5">
                </p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
